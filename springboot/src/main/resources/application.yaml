spring:
  application:
    name: MM-BOOT
  datasource:
    url: jdbc:postgresql://localhost:5432/mm
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
#    hibernate:
#      ddl-auto: update   # 开发用：update / create / validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: caffeine
    cache-names:
      - group
    caffeine:
      spec: initialCapacity=100,maximumSize=10000,expireAfterWrite=30m,recordStats
jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem
  access-expire: 900        # 15分钟
  refresh-expire: 604800    # 7天
springdoc:
  swagger-ui:
    # 自定义 Swagger UI 的访问地址，默认是 /swagger-ui.html
    path: /swagger-ui.html
    # 启用尝试功能（Try it out）
    enabled: true
  api-docs:
    # OpenAPI 描述文件的路径，默认是 /v3/api-docs
    path: /api-docs
  # 只扫描特定的包
  packages-to-scan: com.mm.controller

