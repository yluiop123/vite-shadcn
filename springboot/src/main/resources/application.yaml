spring:
  application:
    name: MM-BOOT
  datasource:
    url: jdbc:postgresql://localhost:5432/mm
    username: postgres
    # 数据库密码，从环境变量中获取，本地开发取默认值 postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    # HikariCP 特有配置
    hikari:
      # 连接池中允许的最大连接数（推荐值：CPU核数 * 2 + 1）
      maximum-pool-size: 10
      # 连接池中维护的最小空闲连接数
      minimum-idle: 5
      # 等待连接池分配连接的最大时长（毫秒），超过此时间将抛出异常
      connection-timeout: 30000
      # 一个连接在池里闲置的最大时间
      idle-timeout: 600000
      # 一个连接在池里的最大存活时间（需小于数据库自身的 wait_timeout）
      max-lifetime: 1800000
      # 用于测试连接是否有效的 SQL
      connection-test-query: SELECT 1
  jpa:
#    hibernate:
#      ddl-auto: update   # 开发用：update / create / validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: caffeine
    cache-names:
      - group
    caffeine:
      spec: initialCapacity=100,maximumSize=10000,expireAfterWrite=30m,recordStats
jwt:
  private-key: classpath:keys/private_key.pem
  public-key: classpath:keys/public_key.pem
  access-expire: 900        # 15分钟
  refresh-expire: 604800    # 7天
springdoc:
  swagger-ui:
    # 自定义 Swagger UI 的访问地址，默认是 /swagger-ui.html
    path: /swagger-ui.html
    # 启用尝试功能（Try it out）
    enabled: true
  api-docs:
    # OpenAPI 描述文件的路径，默认是 /v3/api-docs
    path: /api-docs
  # 只扫描特定的包
  packages-to-scan: com.mm.controller

